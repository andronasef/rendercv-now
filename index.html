<html lang="en">
  <head>

        window.dataLayer = window.dataLayer || [];

        gtag("config", "G-8K0JG18T0B");

        // Microsoft Clarity
        (function (c, l, a, r, i, t, y) {
          c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments); };

      rel="stylesheet"
    />

         React and exposes window.rcvBuildTypst / window.rcvGetFonts. -->

    <script type="module" src="https://pyscript.net/releases/2026.7.1/core.js"></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script type="py" src="/app.py" config="/pyscript.toml"></script>
  </body>
</html>
